# Done by LLM.
name: Update Solved Problems

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# --- ADD THIS SECTION ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# ------------------------
jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Python Script
        run: python update_readme.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. Stage the specific file that was changed
          git add CompetitiveProgrammingSolveLog.md
          
          # 2. Commit the changes. The "|| exit 0" ensures the script doesn't 
          # fail if there are no new problems found (nothing to commit).
          git commit -m "docs: update solve log" || exit 0
          
          # 3. Now pull any changes from the remote repo. 
          # Since we committed, Git can now rebase smoothly.
          git pull --rebase origin main
          
          # 4. Push the final result
          git push origin main
