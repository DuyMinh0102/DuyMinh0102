name: Update Solved Problems

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# --- ADD THIS SECTION ---
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
# ------------------------

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Python Script
        run: python update_readme.py

      - name: Commit and Push changes
        run: |
                git config --global user.name "github-actions[bot]"
                git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
                
                # 1. Sync with the remote first (while index is clean)
                git fetch origin main
                git pull --rebase origin main
                
                # 2. Now that we are synced, stage the changes made by the python script
                git add README.md
                
                # 3. Commit only if the README actually changed
                git commit -m "docs: dynamically update solved problems list" || echo "No changes to commit"
                
                # 4. Push safely
                git push origin main
